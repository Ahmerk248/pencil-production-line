apiVersion: 1
datasources:
  - name: InfluxDB_Flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: srh
      defaultBucket: pencil_bucket
    secureJsonData:
      token: my-super-secret-auth-token
    isDefault: true
    editable: true
